<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nightwork — Marketing UI kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  :root {
    --nw-teal: #3F5862; --nw-teal-hover: #2F4850;
    --nw-brass: #E89A2B; --nw-amber: #E65100;
    --nw-cream: #F5EDD8; --nw-page: #F7F5ED;
    --nw-subtle: #F5F5F5; --nw-border: #E8E8E8;
    --nw-text-primary: #3F5862; --nw-text-secondary: #878787;
    --nw-status-success: #2E7D32; --nw-status-warning: #E89A2B; --nw-status-danger: #c0392b;
    --nw-display: "Century Gothic", "URW Gothic", "ITC Avant Garde Gothic", "Futura", "Montserrat", system-ui, sans-serif;
    --nw-body: "Inter", system-ui, -apple-system, sans-serif;
    --nw-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  }
  html,body { margin:0; background: #fff; font-family: var(--nw-body); color: var(--nw-text-primary); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
        <PublicHeader />
        <Hero />
        <Features />
        <Pricing />
        <CallToAction />
        <PublicFooter />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
