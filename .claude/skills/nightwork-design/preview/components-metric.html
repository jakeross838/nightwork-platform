<!doctype html>
<html><head><meta charset="utf-8"><title>KPI metric</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#F7F5EC}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-default);border:1px solid var(--border-default)}.k{background:#fff;padding:18px 20px}.l{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:8px}.n{font-family:var(--font-display);font-weight:600;font-size:28px;letter-spacing:-0.02em;color:var(--text-primary)}.n.w{color:#C98A3B}.d{font-family:var(--font-mono);font-size:11px;margin-top:6px;color:#4E7A8C}.bar{height:3px;background:rgba(59,88,100,0.1);margin-top:10px}.bar i{display:block;height:100%;background:#5B8699}</style>
</head><body>
<div class="g">
<div class="k"><div class="l">Contract</div><div class="n">$4.82M</div><div class="d">Base + 3 COs</div><div class="bar"><i style="width:100%"></i></div></div>
<div class="k"><div class="l">Billed</div><div class="n">$2.89M</div><div class="d">60% of contract</div><div class="bar"><i style="width:60%"></i></div></div>
<div class="k"><div class="l">Remaining</div><div class="n">$1.93M</div><div class="d">Thru close</div><div class="bar"><i style="width:40%;background:rgba(59,88,100,0.3)"></i></div></div>
<div class="k"><div class="l">Pending you</div><div class="n w">$175k</div><div class="d">Draw #9</div><div class="bar"><i style="width:100%;background:#C98A3B"></i></div></div>
</div>
</body></html>
