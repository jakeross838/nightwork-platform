<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:#F7F5EC;display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.l{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);width:90px;flex-shrink:0}</style>
</head><body>
<div class="row"><span class="l">Primary</span><button class="btn btn-primary">Approve &amp; release →</button><button class="btn btn-primary">Submit draw</button></div>
<div class="row"><span class="l">Accent</span><button class="btn btn-accent">Sign in →</button><button class="btn btn-accent">Next step</button></div>
<div class="row"><span class="l">Ghost</span><button class="btn btn-ghost">Request changes</button><button class="btn btn-ghost">Cancel</button></div>
</body></html>
