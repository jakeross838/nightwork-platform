<!doctype html>
<html><head><meta charset="utf-8"><title>Corners & borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .card{border:1px solid var(--border-default);background:#fff;padding:14px 18px;min-width:130px;text-align:center;}
  .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-top:6px;}
  .name{font-size:12px;color:var(--text-primary);font-weight:600;}
  .tile{width:48px;height:48px;display:inline-block;vertical-align:middle;margin-right:10px;}
  .dot{width:12px;height:12px;border-radius:999px;background:#2E7D32;display:inline-block;}
</style></head>
<body>
  <div class="card" style="border-radius:0;"><div class="name">Card · Button · Field</div><div class="lbl">radius 0 (default)</div></div>
  <div class="card" style="padding:0;border:0;"><img src="../assets/nightwork-icon.svg" alt="" style="width:80px;height:80px;display:block;"><div class="lbl">App mark · rx 14 (sole)</div></div>
  <div class="card"><span class="dot"></span> <span style="vertical-align:middle;font-size:13px;color:#3F5862;">Active</span><div class="lbl">Status dot · rounded-full</div></div>
  <div class="card" style="background:#F5F5F5;border:1px dashed var(--border-default);padding:18px 22px;"><div class="name" style="color:#878787">Empty state</div><div class="lbl">Dashed 1px border</div></div>
</body></html>
