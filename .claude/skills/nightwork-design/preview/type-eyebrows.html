<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:#fff;display:flex;flex-direction:column;gap:18px}.b{padding-bottom:10px;border-bottom:1px solid var(--border-default)}.e{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-secondary);font-weight:500}.e.warn{color:#C98A3B}.e.ok{color:#4A8A6F}.e.accent{color:#4E7A8C}.h{font-family:var(--font-display);font-size:20px;color:var(--text-primary);letter-spacing:-0.02em;margin-top:4px}</style>
</head><body>
<div class="b"><div class="e">ANNA MARIA — HANLON RESIDENCE</div><div class="h">Welcome back, David.</div></div>
<div class="b"><div class="e warn">⚠ AWAITING YOUR APPROVAL · DUE APR 25</div><div class="h">Draw #9 — Review &amp; approve</div></div>
<div class="b"><div class="e accent">OWNER PORTAL · ROSS BUILT</div><div class="h">Sign in to continue</div></div>
</body></html>
