<!doctype html>
<html><head><meta charset="utf-8"><title>Elevation & hover</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#F7F5ED;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .card{background:#fff;border:1px solid #E8E8E8;padding:18px;min-height:90px;}
  .card.hover{background:#F5F5F5;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);}
  .card.highlight{border-color:#3F5862;box-shadow:0 8px 24px -12px rgba(63,88,98,0.25);}
  .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#878787;}
  .name{font-size:12px;color:#3F5862;font-weight:600;margin-top:4px;}
  .val{font-family:var(--font-mono);font-size:10px;color:#878787;margin-top:4px;}
</style></head>
<body>
  <div class="card"><div class="lbl">Default</div><div class="name">Border only</div><div class="val">1px #E8E8E8 · no shadow</div></div>
  <div class="card hover"><div class="lbl">Hover</div><div class="name">bg-subtle + lift</div><div class="val">0 4 6 -1 rgba(0,0,0,.1)</div></div>
  <div class="card highlight"><div class="lbl">Highlight · selected</div><div class="name">Teal tint drop</div><div class="val">0 8 24 -12 rgba(63,88,98,.25)</div></div>
</body></html>
