<!doctype html>
<html><head><meta charset="utf-8"><title>Neutral / surface colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border:1px solid var(--border-default);}
  .chip{height:80px;border-bottom:1px solid var(--border-default);}
  .meta{padding:10px 12px;}
  .name{font-size:12px;font-weight:600;color:var(--text-primary);}
  .hex{font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);margin-top:3px;}
  .use{font-size:10px;color:var(--text-secondary);margin-top:4px;text-transform:uppercase;letter-spacing:.08em;}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#F7F5ED"></div><div class="meta"><div class="name">bg-page</div><div class="hex">#F7F5ED</div><div class="use">The warm off-white</div></div></div>
  <div class="sw"><div class="chip" style="background:#F5F5F5"></div><div class="meta"><div class="name">bg-subtle</div><div class="hex">#F5F5F5</div><div class="use">Table headers · hover</div></div></div>
  <div class="sw"><div class="chip" style="background:#E8E8E8"></div><div class="meta"><div class="name">bg-muted / border</div><div class="hex">#E8E8E8</div><div class="use">Elevated · default border</div></div></div>
  <div class="sw"><div class="chip" style="background:#A0A0A0"></div><div class="meta"><div class="name">border-strong</div><div class="hex">#A0A0A0</div><div class="use">Scrollbar · strong rule</div></div></div>
</div>
</body></html>
