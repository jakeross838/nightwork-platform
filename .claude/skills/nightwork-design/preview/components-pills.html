<!doctype html>
<html><head><meta charset="utf-8"><title>Status pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:#fff;display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.l{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);width:100px;flex-shrink:0}</style>
</head><body>
<div class="row"><span class="l">Invoice</span>
<span class="pill pill-ok">Verified</span>
<span class="pill pill-warn">Over allowance</span>
<span class="pill pill-accent">Awaiting you</span>
<span class="pill pill-muted">Paid</span>
<span class="pill pill-danger">Disputed</span>
</div>
<div class="row"><span class="l">Job</span>
<span class="pill pill-ok">Active</span>
<span class="pill pill-muted">Complete</span>
<span class="pill pill-warn">Warranty</span>
</div>
</body></html>
