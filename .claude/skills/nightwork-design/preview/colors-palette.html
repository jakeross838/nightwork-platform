<!doctype html>
<html><head><meta charset="utf-8"><title>Slate palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.sw{border:1px solid var(--border-default)}.chip{height:70px}.m{padding:8px 10px}.n{font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--text-primary)}.h{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:2px}.u{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-top:4px;text-transform:uppercase;letter-spacing:.1em}</style>
</head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#3B5864"></div><div class="m"><div class="n">Slate Tile</div><div class="h">#3B5864</div><div class="u">Primary text · brand</div></div></div>
<div class="sw"><div class="chip" style="background:#1A2830"></div><div class="m"><div class="n">Slate Deep</div><div class="h">#1A2830</div><div class="u">Nav · primary btn</div></div></div>
<div class="sw"><div class="chip" style="background:#5B8699"></div><div class="m"><div class="n">Stone Blue</div><div class="h">#5B8699</div><div class="u">Accent · progress</div></div></div>
<div class="sw"><div class="chip" style="background:#CBD8DB"></div><div class="m"><div class="n">Oceanside</div><div class="h">#CBD8DB</div><div class="u">Tint · subtle</div></div></div>
<div class="sw"><div class="chip" style="background:#F7F5EC;border-bottom:1px solid var(--border-default)"></div><div class="m"><div class="n">White Sand</div><div class="h">#F7F5EC</div><div class="u">Page bg</div></div></div>
</div>
</body></html>
