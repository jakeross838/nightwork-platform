<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;background:#fff}.r{display:flex;align-items:baseline;gap:18px;padding:6px 0;border-bottom:1px solid var(--border-subtle)}.r:last-child{border:none}.t{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);width:90px;flex-shrink:0}.s{font-family:var(--font-display);font-weight:500;color:var(--text-primary);letter-spacing:-0.02em}</style>
</head><body>
<div class="r"><span class="t">H1 · 38</span><span class="s" style="font-size:38px">Draw #9 review</span></div>
<div class="r"><span class="t">H2 · 30</span><span class="s" style="font-size:30px">Vendor invoices</span></div>
<div class="r"><span class="t">H3 · 22</span><span class="s" style="font-size:22px;font-weight:500">Gulf Millwork</span></div>
<div class="r"><span class="t">Lg · 17</span><span class="s" style="font-size:17px">Section title</span></div>
<div class="r"><span class="t">Body · 14</span><span style="font-family:var(--font-body);font-size:14px;color:var(--text-primary)">Default body size · Inter 14</span></div>
</body></html>
