<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border:1px solid var(--border-default);}
  .chip{height:80px;}
  .meta{padding:10px 12px;}
  .name{font-size:12px;font-weight:600;color:var(--text-primary);font-family:var(--font-sans);}
  .hex{font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);margin-top:3px;}
  .use{font-size:10px;color:var(--text-secondary);margin-top:4px;text-transform:uppercase;letter-spacing:.08em;}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#0F1E36"></div><div class="meta"><div class="name">Navy</div><div class="hex">#0F1E36</div><div class="use">Icon tile · marketing dark</div></div></div>
  <div class="sw"><div class="chip" style="background:#3F5862"></div><div class="meta"><div class="name">Teal</div><div class="hex">#3F5862</div><div class="use">Primary · text · chrome</div></div></div>
  <div class="sw"><div class="chip" style="background:#E89A2B"></div><div class="meta"><div class="name">Amber</div><div class="hex">#E89A2B</div><div class="use">Brand accent · 1 per screen</div></div></div>
  <div class="sw"><div class="chip" style="background:#E65100"></div><div class="meta"><div class="name">Brass</div><div class="hex">#E65100</div><div class="use">CO chips · retainage</div></div></div>
  <div class="sw"><div class="chip" style="background:#EDE3CE"></div><div class="meta"><div class="name">Cream</div><div class="hex">#EDE3CE</div><div class="use">Wordmark on dark</div></div></div>
</div>
</body></html>
