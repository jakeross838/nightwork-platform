<!doctype html>
<html><head><meta charset="utf-8"><title>Status badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .chip{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid;font-weight:700;}
  .dot{width:6px;height:6px;border-radius:999px;display:inline-block;margin-right:6px;vertical-align:middle;}
  .row{display:inline-flex;align-items:center;font-size:12px;color:#3F5862;padding:4px 8px;}
  .role{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid #fff;color:#fff;background:#3F5862;font-weight:700;}
</style></head>
<body>
  <span class="chip" style="color:#c0392b;border-color:#c0392b">7d old</span>
  <span class="chip" style="color:#E65100;border-color:#E65100">5d pending</span>
  <span class="chip" style="color:#878787;border-color:#E8E8E8">Soon</span>
  <span class="chip" style="color:#fff;border-color:#3F5862;background:#3F5862;letter-spacing:.12em;padding:3px 8px;">Most Popular</span>
  <span class="row"><span class="dot" style="background:#2E7D32"></span>Active</span>
  <span class="row"><span class="dot" style="background:#E89A2B"></span>Warranty</span>
  <span class="row"><span class="dot" style="background:#878787"></span>Complete</span>
  <span class="role">PM</span>
  <span class="role">Admin</span>
</body></html>
