<!doctype html>
<html><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:18px}.f label{display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px}.f input,.f select{width:100%;padding:11px 12px;background:#fff;border:1px solid var(--border-strong);font-family:var(--font-body);font-size:14px;color:var(--text-primary);outline:none}.f input:focus{border-color:#5B8699;box-shadow:0 0 0 2px rgba(91,134,153,0.12)}</style>
</head><body>
<div class="f"><label>Email</label><input value="david.hanlon@gmail.com"></div>
<div class="f"><label>Draw period</label><select><option>Apr 1 — Apr 18, 2026</option></select></div>
<div class="f"><label>Amount</label><input value="$175,037.50" style="font-family:var(--font-mono)"></div>
<div class="f"><label>Vendor</label><input placeholder="Gulf Millwork &amp; Framing"></div>
</body></html>
