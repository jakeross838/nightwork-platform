<!doctype html>
<html><head><meta charset="utf-8"><title>Attention row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#F7F5ED;font-family:var(--font-body);}
  .list{background:#fff;border:1px solid #E8E8E8;}
  .row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #E8E8E8;}
  .row:last-child{border:none;}
  .dot{width:8px;height:8px;border-radius:999px;flex-shrink:0;}
  .txt{flex:1;min-width:0;}
  .title{font-size:14px;color:#3F5862;font-weight:500;}
  .age{font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-left:8px;font-family:var(--font-sans);}
  .desc{font-size:12px;color:#878787;margin-top:2px;}
  .chev{color:#878787;}
</style></head>
<body>
<div class="list">
  <div class="row"><span class="dot" style="background:#c0392b"></span><div class="txt"><div class="title">Invoice #INV-04821 over budget<span class="age" style="color:#c0392b">12d</span></div><div class="desc">Florida Sunshine Carpentry · Drummond Residence · $4,200 over cost code 06101</div></div><span class="chev">›</span></div>
  <div class="row"><span class="dot" style="background:#E65100"></span><div class="txt"><div class="title">Draw #7 awaiting approval<span class="age" style="color:#E65100">5d</span></div><div class="desc">Bay Isles · submitted Mar 14 · $218,450.00</div></div><span class="chev">›</span></div>
  <div class="row"><span class="dot" style="background:#E89A2B"></span><div class="txt"><div class="title">2 lien releases missing</div><div class="desc">Doug Naeher Drywall, Acme Concrete · Drummond Draw #8</div></div><span class="chev">›</span></div>
</div>
</body></html>
