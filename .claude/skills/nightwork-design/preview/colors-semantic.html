<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.sw{border:1px solid var(--border-default)}.chip{height:70px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase}.m{padding:8px 10px}.n{font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--text-primary)}.h{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:2px}.u{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-top:4px;text-transform:uppercase;letter-spacing:.1em}</style>
</head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#4A8A6F">SUCCESS</div><div class="m"><div class="n">Success</div><div class="h">#4A8A6F</div><div class="u">Approvals · complete</div></div></div>
<div class="sw"><div class="chip" style="background:#C98A3B">WARNING</div><div class="m"><div class="n">Warn</div><div class="h">#C98A3B</div><div class="u">Pending · overages</div></div></div>
<div class="sw"><div class="chip" style="background:#B0554E">DANGER</div><div class="m"><div class="n">Danger</div><div class="h">#B0554E</div><div class="u">Disputes · errors</div></div></div>
</div>
</body></html>
