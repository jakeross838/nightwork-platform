<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);}
  .row{display:flex;align-items:baseline;gap:24px;padding:12px 0;}
  .row + .row{border-top:1px solid var(--border-default);}
  .lbl{min-width:150px;font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);}
  .eb-10{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#878787;font-weight:500;font-family:var(--font-sans);}
  .eb-11{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#878787;font-weight:500;font-family:var(--font-sans);}
  .eb-btn{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:#3F5862;padding:10px 20px;font-weight:500;display:inline-block;font-family:var(--font-sans);}
  .eb-section{font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#878787;padding-bottom:8px;border-bottom:1px solid #E8E8E8;font-family:var(--font-sans);}
</style></head>
<body>
  <div class="row"><span class="lbl">10 / 0.12em</span><span class="eb-10">Capabilities</span></div>
  <div class="row"><span class="lbl">11 / 0.12em</span><span class="eb-11">Cost Code</span></div>
  <div class="row"><span class="lbl">Section w/ rule</span><span class="eb-section">Draw Details</span></div>
  <div class="row"><span class="lbl">13 / 0.08em · button</span><span class="eb-btn">Start Free Trial</span></div>
</body></html>
